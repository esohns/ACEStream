<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#333" />
    </marker>
    <style>
      .group-external { fill:#fff3cd; stroke:#333; stroke-width:2px; rx:10; }
      .group-library { fill:#f3f4f6; stroke:#333; stroke-width:2px; rx:10; }
      .group-consumers { fill:#e6ffed; stroke:#333; stroke-width:2px; rx:10; }
      .node { fill:#ffffff; stroke:#333; stroke-width:2px; rx:6; }
      .label-title { font: bold 16px sans-serif; fill:#111; }
      .label-text { font: bold 13px sans-serif; fill:#111; }
      .label-sub { font: 11px sans-serif; fill:#555; }
      .arrow { stroke:#333; stroke-width:2px; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <!-- Background groups -->
  <rect x="20" y="20" width="340" height="200" class="group-external" />
  <text x="40" y="45" class="label-title">External Dependencies</text>

  <rect x="400" y="10" width="580" height="770" class="group-library" />
  <text x="420" y="40" class="label-title">ACEStream Library (src/)</text>

  <rect x="1020" y="20" width="360" height="200" class="group-consumers" />
  <text x="1040" y="45" class="label-title">Applications &amp; Tests</text>

  <!-- External nodes -->
  <rect x="40" y="70" width="300" height="80" class="node"/>
  <text x="60" y="100" class="label-text">ACE Framework</text>
  <text x="60" y="125" class="label-sub">(ace/Stream, ACE_Module, ACE_Task)</text>

  <rect x="40" y="160" width="300" height="50" class="node"/>
  <text x="60" y="190" class="label-text">OS Sockets / File APIs</text>

  <!-- Library internal structure -->
  <!-- Top level: Public API -->
  <rect x="440" y="70" width="260" height="80" class="node"/>
  <text x="460" y="100" class="label-text">Public API</text>
  <text x="460" y="125" class="label-sub">(stream_base.h, stream_*.h)</text>

  <!-- Stream_Base_T -->
  <rect x="740" y="70" width="200" height="80" class="node"/>
  <text x="760" y="100" class="label-text">Stream_Base_T</text>
  <text x="760" y="125" class="label-sub">(stream_base.h/.inl)</text>

  <!-- Middle layer: Module classes -->
  <rect x="440" y="190" width="220" height="80" class="node"/>
  <text x="460" y="215" class="label-text">Stream_StreamModule_T</text>
  <text x="460" y="240" class="label-sub">(stream_streammodule_base.h)</text>

  <rect x="700" y="190" width="220" height="80" class="node"/>
  <text x="720" y="215" class="label-text">Stream_Module_Base_T</text>
  <text x="720" y="240" class="label-sub">(stream_module_base.h)</text>

  <rect x="950" y="190" width="180" height="80" class="node"/>
  <text x="970" y="215" class="label-text">Stream_IModule_T</text>
  <text x="970" y="240" class="label-sub">(stream_imodule.h)</text>

  <!-- Net modules -->
  <rect x="440" y="320" width="220" height="80" class="node"/>
  <text x="460" y="345" class="label-text">Net Source Writer</text>
  <text x="460" y="370" class="label-sub">(modules/net/stream_net_source.h)</text>

  <rect x="700" y="320" width="220" height="80" class="node"/>
  <text x="720" y="345" class="label-text">Net Listener</text>
  <text x="720" y="370" class="label-sub">(modules/net/stream_net_listener.h)</text>

  <!-- Parser and Tasks -->
  <rect x="440" y="450" width="220" height="80" class="node"/>
  <text x="460" y="475" class="label-text">Parser Head</text>
  <text x="460" y="500" class="label-sub">(modules/misc/stream_misc_parser.inl)</text>

  <rect x="700" y="450" width="220" height="80" class="node"/>
  <text x="720" y="475" class="label-text">Tasks / Executors</text>
  <text x="720" y="500" class="label-sub">(ACE_Thru_Task, TaskBase)</text>

  <!-- Data and Utilities -->
  <rect x="440" y="580" width="480" height="80" class="node"/>
  <text x="460" y="605" class="label-text">Layout / MessageQueue / Data</text>
  <text x="460" y="630" class="label-sub">(stream_layout.h, stream_messagequeue.h)</text>

  <rect x="440" y="710" width="480" height="50" class="node"/>
  <text x="460" y="740" class="label-text">Utilities (Logging, Config, Errors)</text>

  <!-- Consumer nodes -->
  <rect x="1040" y="70" width="320" height="80" class="node"/>
  <text x="1060" y="100" class="label-text">Applications / Examples</text>
  <text x="1060" y="125" class="label-sub">(test_i/, examples)</text>

  <rect x="1040" y="160" width="320" height="50" class="node"/>
  <text x="1060" y="190" class="label-text">Test Suite (test_i/)</text>

  <!-- Connecting arrows -->
  <!-- External to Library -->
  <path d="M340 110 L440 110" class="arrow" />
  <path d="M340 185 Q390 150 440 130" class="arrow" />

  <!-- API to Consumers -->
  <path d="M700 110 L1040 110" class="arrow" />

  <!-- API to Stream_Base_T -->
  <path d="M700 110 L740 110" class="arrow" />

  <!-- Stream_Base_T to Stream_StreamModule_T -->
  <path d="M740 150 Q680 170 660 190" class="arrow" />

  <!-- Stream_StreamModule_T to Stream_Module_Base_T -->
  <path d="M660 230 L700 230" class="arrow" />

  <!-- Stream_Module_Base_T to Stream_IModule_T -->
  <path d="M920 230 L950 230" class="arrow" />

  <!-- Net Source to Module_Base -->
  <path d="M550 320 L750 270" class="arrow" />

  <!-- Net Listener to Module_Base -->
  <path d="M750 320 L810 270" class="arrow" />

  <!-- Parser to Module_Base -->
  <path d="M550 450 L750 270" class="arrow" />

  <!-- Tasks to Module_Base -->
  <path d="M750 450 L810 270" class="arrow" />

  <!-- Data to Stream_Base_T -->
  <path d="M680 580 L800 150" class="arrow" />

  <!-- Utilities to Module_Base -->
  <path d="M680 710 L810 270" class="arrow" />

  <!-- API to Tests -->
  <path d="M700 110 Q870 110 1040 185" class="arrow" />

  <!-- Tests to Stream_Base -->
  <path d="M1040 185 Q900 150 740 150" class="arrow" />

</svg>
