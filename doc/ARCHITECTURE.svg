<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#333" />
    </marker>
    <style>
      .group { fill:#f3f4f6; stroke:#333; stroke-width:1px; rx:8; }
      .external { fill:#fff3cd; stroke:#333; stroke-width:1px; rx:8; }
      .consumers { fill:#e6ffed; stroke:#333; stroke-width:1px; rx:8; }
      .node { fill:#ffffff; stroke:#333; stroke-width:1px; rx:6; }
      .label { font: bold 14px sans-serif; fill:#111; }
      .small { font: 12px sans-serif; fill:#111; }
      .title { font: bold 18px sans-serif; fill:#111; }
      .muted { font: 12px sans-serif; fill:#444; }
      .arrow { stroke:#333; stroke-width:1.5px; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <!-- Group backgrounds -->
  <rect x="40" y="30" width="320" height="220" class="external" />
  <text x="60" y="52" class="label">External Dependencies</text>

  <rect x="400" y="20" width="420" height="540" class="group" />
  <text x="420" y="42" class="label">ACEStream Library (src/)</text>

  <rect x="860" y="30" width="300" height="220" class="consumers" />
  <text x="880" y="52" class="label">Applications & Tests</text>

  <!-- External nodes -->
  <g id="external-nodes">
    <rect x="60" y="80" width="280" height="60" class="node" rx="6"/>
    <text x="70" y="100" class="small">ACE Framework</text>
    <text x="70" y="118" class="muted">(ace/Stream, ACE_Module, ACE_Task)</text>

    <rect x="60" y="160" width="280" height="60" class="node" rx="6"/>
    <text x="70" y="180" class="small">OS Sockets / File APIs</text>
  </g>

  <!-- Library internal nodes -->
  <g id="library-nodes">
    <!-- Top row: API and Base -->
    <rect x="440" y="60" width="240" height="70" class="node" rx="6"/>
    <text x="460" y="85" class="small">Public API</text>
    <text x="460" y="103" class="muted">(stream_base.h, stream_*.h)</text>

    <rect x="720" y="60" width="140" height="70" class="node" rx="6"/>
    <text x="732" y="85" class="small">Stream_Base_T</text>
    <text x="732" y="103" class="muted">(stream_base.h/.inl)</text>

    <!-- Middle row: modules -->
    <rect x="440" y="170" width="180" height="60" class="node" rx="6"/>
    <text x="452" y="192" class="small">Stream_StreamModule_T</text>
    <text x="452" y="208" class="muted">(stream_streammodule_base.h)</text>

    <rect x="640" y="170" width="180" height="60" class="node" rx="6"/>
    <text x="652" y="192" class="small">Stream_Module_Base_T</text>
    <text x="652" y="208" class="muted">(stream_module_base.h)</text>

    <rect x="540" y="260" width="160" height="60" class="node" rx="6"/>
    <text x="552" y="282" class="small">Stream_IModule_T</text>
    <text x="552" y="298" class="muted">(stream_imodule.h)</text>

    <!-- Right column: net modules, parser, tasks, data -->
    <rect x="720" y="260" width="180" height="56" class="node" rx="6"/>
    <text x="732" y="282" class="small">Net Source Writer</text>
    <text x="732" y="298" class="muted">(modules/net/stream_net_source.h)</text>

    <rect x="720" y="340" width="180" height="56" class="node" rx="6"/>
    <text x="732" y="362" class="small">Net Listener</text>
    <text x="732" y="378" class="muted">(modules/net/stream_net_listener.h)</text>

    <rect x="520" y="350" width="180" height="56" class="node" rx="6"/>
    <text x="532" y="372" class="small">Parser Head</text>
    <text x="532" y="388" class="muted">(modules/misc/stream_misc_parser.inl)</text>

    <rect x="440" y="440" width="180" height="56" class="node" rx="6"/>
    <text x="452" y="462" class="small">Tasks / Executors</text>
    <text x="452" y="478" class="muted">(ACE_Thru_Task, TaskBase)</text>

    <rect x="660" y="440" width="240" height="56" class="node" rx="6"/>
    <text x="672" y="462" class="small">Layout / Message Queue / Data</text>
    <text x="672" y="478" class="muted">(stream_layout.h, stream_messagequeue.h)</text>

    <rect x="520" y="520" width="340" height="56" class="node" rx="6"/>
    <text x="532" y="542" class="small">Utilities (Logging, Config, Errors)</text>
  </g>

  <!-- Consumers -->
  <g id="consumers-nodes">
    <rect x="880" y="100" width="260" height="70" class="node" rx="6"/>
    <text x="900" y="125" class="small">Applications / Examples</text>
    <text x="900" y="143" class="muted">(test_i/, examples)</text>

    <rect x="880" y="190" width="260" height="70" class="node" rx="6"/>
    <text x="900" y="215" class="small">Test Suite</text>
    <text x="900" y="233" class="muted">(test_i/)</text>
  </g>

  <!-- Arrows connecting nodes -->
  <!-- ACE -> NetWriter -->
  <path d="M340 110 L440 200" class="arrow" />
  <!-- OS -> ACE (curved) -->
  <path d="M200 220 C250 240 300 240 360 220" class="arrow" marker-end="url(#arrow)" />

  <!-- ACE -> Tasks -->
  <path d="M340 110 L560 470" class="arrow" />
  <!-- NetWriter -> ModuleBase -->
  <path d="M760 290 L720 200" class="arrow" />
  <!-- NetListener -> ModuleBase -->
  <path d="M760 360 L660 200" class="arrow" />
  <!-- Parser -> ModuleBase -->
  <path d="M600 372 L620 230" class="arrow" />

  <!-- ModuleBase -> StreamModule -->
  <path d="M700 200 L560 200" class="arrow" />
  <!-- StreamModule -> Base -->
  <path d="M560 200 L740 90" class="arrow" />
  <!-- Base -> API -->
  <path d="M750 90 L680 100" class="arrow" />

  <!-- Data -> Base -->
  <path d="M780 470 L760 130" class="arrow" />
  <!-- Tasks -> ModuleBase -->
  <path d="M560 470 L640 200" class="arrow" />
  <!-- Utils -> ModuleBase -->
  <path d="M700 540 L660 220" class="arrow" />

  <!-- API -> Consumers -->
  <path d="M680 100 L880 135" class="arrow" />
  <path d="M680 100 L880 225" class="arrow" />

  <!-- Tests -> Base -->
  <path d="M880 225 L740 120" class="arrow" />

  <!-- Titles/Legend -->
  <text x="60" y="280" class="muted">(This SVG was generated from the repository's ARCHITECTURE.mmd/ARCHITECTURE.md content.)</text>

</svg>
